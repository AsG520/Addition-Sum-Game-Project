<!-- Reference - Special Thanks: YouTube Video (https://youtu.be/I5kj-YsmWjM?si=IxsOPgCv7Il_R9NG) -->
<html>
  <head>
    <title>Addition Sum Game (Arithmetic Operators) - v.2026</title>
    <link rel="stylesheet" href="style.css" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Cabin:ital,wght@0,400..700;1,400..700&family=Google+Sans+Code:ital,wght,MONO@0,300..800,1;1,300..800,1&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Outfit:wght@100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Press+Start+2P&family=Roboto+Mono:ital,wght@0,100..700;1,100..700&family=Source+Code+Pro:ital,wght@0,200..900;1,200..900&display=swap"
      rel="stylesheet"
    />
    <link rel="shortcut icon" href="icon.jpg" />
  </head>
  <body>
    <div id="container">
      <form>
        <div id="box-container">
          <input type="text" value="" id="box" readonly />
        </div>
        <div id="input-container">
          <input type="number" value="" id="input" min="0" max="20" readonly />
        </div>
        <div id="score-container">
          <input type="number" value="0" id="score" readonly />
        </div>
        <div id="number-container">
          <input
            type="button"
            value="1"
            id="number-one"
            onclick="updateInput('1')"
          />
          <input
            type="button"
            value="2"
            id="number-two"
            onclick="updateInput('2')"
          />
          <input
            type="button"
            value="3"
            id="number-three"
            onclick="updateInput('3')"
          />
          <input
            type="button"
            value="4"
            id="number-four"
            onclick="updateInput('4')"
          />
          <input
            type="button"
            value="5"
            id="number-five"
            onclick="updateInput('5')"
          />
          <input
            type="button"
            value="6"
            id="number-six"
            onclick="updateInput('6')"
          />
          <input
            type="button"
            value="7"
            id="number-seven"
            onclick="updateInput('7')"
          />
          <input
            type="button"
            value="8"
            id="number-eight"
            onclick="updateInput('8')"
          />
          <input
            type="button"
            value="9"
            id="number-nine"
            onclick="updateInput('9')"
          />
          <input
            type="button"
            value="0"
            id="number-zero"
            onclick="updateInput('0')"
          />
          <input type="button" id="back-space" value="←" />
        </div>
        <div id="submit-container">
          <input type="button" value="Submit" id="submit" />
        </div>
        <div id="restart-container">
          <input type="button" value="Restart" id="restart" />
        </div>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
